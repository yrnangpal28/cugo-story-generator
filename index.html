<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Cugo Story</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0820;
      font-family: 'DM Sans', sans-serif;
      color: #f0e8d5;
      min-height: 100vh;
    }

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,220,150,0.5);
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    @keyframes floatUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    .header {
      text-align: center;
      padding: 48px 0 36px;
      animation: floatUp 0.7s ease forwards;
    }

    .moon { font-size: 52px; display: block; margin-bottom: 14px; }

    .brand-tag {
      display: inline-block;
      background: rgba(255,200,80,0.12);
      border: 1px solid rgba(255,200,80,0.3);
      color: #ffd060;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 300;
      line-height: 1.2;
      color: #f7edd8;
      margin-bottom: 10px;
    }

    h1 em { font-style: italic; color: #ffc85a; }

    .subtitle {
      color: rgba(240,232,213,0.5);
      font-size: 14px;
      line-height: 1.6;
      max-width: 360px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 32px 28px;
      animation: floatUp 0.8s ease 0.1s both;
    }

    .field { margin-bottom: 24px; }

    .label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,200,80,0.8);
      font-weight: 500;
      margin-bottom: 10px;
    }

    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 16px;
      font-family: 'Fraunces', serif;
      color: #f7edd8;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]::placeholder { color: rgba(240,232,213,0.3); font-style: italic; }
    input[type="text"]:focus { border-color: rgba(255,200,80,0.5); }

    .pills { display: flex; flex-wrap: wrap; gap: 8px; }

    .pill {
      padding: 8px 14px;
      border-radius: 100px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.04);
      color: rgba(240,232,213,0.6);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .pill:hover { border-color: rgba(255,200,80,0.4); color: #f7edd8; }
    .pill.active {
      background: rgba(255,200,80,0.18);
      border-color: rgba(255,200,80,0.6);
      color: #ffd060;
    }

    .theme-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .theme-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 12px 6px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      cursor: pointer;
      transition: all 0.2s;
      color: rgba(240,232,213,0.6);
      font-family: 'DM Sans', sans-serif;
    }

    .theme-btn .emoji { font-size: 22px; }
    .theme-btn .tlabel { font-size: 10px; text-align: center; line-height: 1.3; }
    .theme-btn:hover { border-color: rgba(255,200,80,0.4); color: #f7edd8; transform: translateY(-2px); }
    .theme-btn.active {
      background: rgba(255,200,80,0.18);
      border-color: rgba(255,200,80,0.6);
      color: #ffd060;
    }

    .or { text-align: center; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: rgba(240,232,213,0.3); margin: 10px 0; }

    .error {
      background: rgba(255,100,100,0.1);
      border: 1px solid rgba(255,100,100,0.3);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: #ff9090;
      margin-bottom: 18px;
      text-align: center;
      display: none;
    }

    .btn {
      width: 100%;
      padding: 17px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #ffc040, #ff9a3c);
      color: #1a0a00;
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 8px 32px rgba(255,160,50,0.35);
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(255,160,50,0.5); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Story */
    .story-view { display: none; animation: floatUp 0.7s ease forwards; }

    .story-book {
      background: rgba(255,248,230,0.05);
      border: 1px solid rgba(255,220,130,0.2);
      border-radius: 28px;
      padding: 40px 36px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.4);
      margin-bottom: 16px;
    }

    .story-deco { text-align: center; font-size: 28px; margin-bottom: 20px; }

    .story-title {
      font-family: 'Fraunces', serif;
      font-size: 24px;
      font-weight: 400;
      font-style: italic;
      color: #ffd060;
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.3;
    }

    .story-body {
      font-family: 'Fraunces', serif;
      font-size: 16px;
      line-height: 2;
      color: rgba(247,237,216,0.9);
      font-weight: 300;
      white-space: pre-wrap;
    }

    .story-end { text-align: center; margin-top: 24px; opacity: 0.4; font-size: 18px; }

    .actions { display: flex; gap: 10px; margin-top: 16px; }

    .btn-ghost {
      flex: 1;
      padding: 13px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: rgba(240,232,213,0.7);
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-ghost:hover { background: rgba(255,255,255,0.09); color: #f7edd8; }

    .btn-sm {
      flex: 1;
      padding: 13px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, #ffc040, #ff9a3c);
      color: #1a0a00;
      font-size: 14px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-sm:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,160,50,0.4); }

    .watermark {
      text-align: center;
      margin-top: 32px;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,200,80,0.25);
    }

    @media (max-width: 420px) {
      .card { padding: 24px 18px; }
      .story-book { padding: 28px 20px; }
      .theme-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="wrap">
  <div class="header">
    <span class="moon">🌙</span>
    <div class="brand-tag">Cugo × Bedtime Stories</div>
    <h1>Every baby deserves<br/>a <em>story of their own</em></h1>
    <p class="subtitle">Tell us about your little one and we'll create a warm bedtime tale — just for them.</p>
  </div>

  <!-- Form -->
  <div class="card" id="formView">
    <div class="field">
      <label class="label">Baby's Name</label>
      <input type="text" id="babyName" placeholder="e.g. Aarav, Mia, Zara…" maxlength="30"/>
    </div>

    <div class="field">
      <label class="label">Age Group</label>
      <div class="pills" id="agePills">
        <button class="pill" onclick="selectAge(this, '0–6 months')">0–6 months</button>
        <button class="pill" onclick="selectAge(this, '6–12 months')">6–12 months</button>
        <button class="pill" onclick="selectAge(this, '1–2 years')">1–2 years</button>
        <button class="pill" onclick="selectAge(this, '2–3 years')">2–3 years</button>
        <button class="pill" onclick="selectAge(this, '3–5 years')">3–5 years</button>
      </div>
    </div>

    <div class="field">
      <label class="label">Choose an Adventure</label>
      <div class="theme-grid">
        <button class="theme-btn" onclick="selectTheme(this, 'a first bath adventure')"><span class="emoji">🛁</span><span class="tlabel">First Bath</span></button>
        <button class="theme-btn" onclick="selectTheme(this, 'a magical trip to the park')"><span class="emoji">🌳</span><span class="tlabel">The Park</span></button>
        <button class="theme-btn" onclick="selectTheme(this, 'a cozy monsoon day indoors')"><span class="emoji">🌧️</span><span class="tlabel">Monsoon Day</span></button>
        <button class="theme-btn" onclick="selectTheme(this, 'stargazing under the night sky')"><span class="emoji">🌙</span><span class="tlabel">Stargazing</span></button>
        <button class="theme-btn" onclick="selectTheme(this, 'trying yummy food for the first time')"><span class="emoji">🥣</span><span class="tlabel">First Meal</span></button>
        <button class="theme-btn" onclick="selectTheme(this, 'their very first airplane ride')"><span class="emoji">✈️</span><span class="tlabel">First Flight</span></button>
        <button class="theme-btn" onclick="selectTheme(this, 'a surprise birthday celebration')"><span class="emoji">🎂</span><span class="tlabel">Birthday</span></button>
        <button class="theme-btn" onclick="selectTheme(this, 'a fun day at the beach')"><span class="emoji">🌊</span><span class="tlabel">Beach Day</span></button>
      </div>
      <div class="or">— or write your own —</div>
      <input type="text" id="customTheme" placeholder="e.g. first haircut, playing with bubbles…" maxlength="80"/>
    </div>

    <div class="error" id="errorMsg"></div>

    <button class="btn" id="generateBtn" onclick="generateStory()">✨ Create the Story</button>
  </div>

  <!-- Story -->
  <div class="story-view" id="storyView">
    <div class="story-book">
      <div class="story-deco">🌟 🍃 🌙</div>
      <div class="story-title" id="storyTitle"></div>
      <div class="story-body" id="storyBody"></div>
      <div class="story-end">· · · zzz · · ·</div>
    </div>
    <div class="actions">
      <button class="btn-ghost" onclick="generateStory()">🔄 New Version</button>
      <button class="btn-sm" onclick="resetForm()">+ New Story</button>
    </div>
    <div class="watermark">Made with love by Cugo</div>
  </div>
</div>

<script>
  let selectedAge = "";
  let selectedTheme = "";

  // Generate stars
  const starsEl = document.getElementById("stars");
  for (let i = 0; i < 40; i++) {
    const s = document.createElement("div");
    s.className = "star";
    const size = Math.random() * 3 + 1;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-delay:${Math.random()*4}s;animation-duration:${Math.random()*3+2}s`;
    starsEl.appendChild(s);
  }

  function selectAge(el, val) {
    document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
    el.classList.add("active");
    selectedAge = val;
  }

  function selectTheme(el, val) {
    document.querySelectorAll(".theme-btn").forEach(b => b.classList.remove("active"));
    el.classList.add("active");
    selectedTheme = val;
    document.getElementById("customTheme").value = "";
  }

  async function generateStory() {
    const babyName = document.getElementById("babyName").value.trim();
    const customTheme = document.getElementById("customTheme").value.trim();
    const theme = selectedTheme || customTheme;
    const errorEl = document.getElementById("errorMsg");

    if (!babyName || !selectedAge || !theme) {
      errorEl.style.display = "block";
      errorEl.textContent = "Please fill in all the details to create your story ✨";
      return;
    }

    errorEl.style.display = "none";
    const btn = document.getElementById("generateBtn");
    btn.disabled = true;
    btn.textContent = "Writing your story…";

    document.getElementById("storyTitle").textContent = "";
    document.getElementById("storyBody").textContent = "";
    document.getElementById("formView").style.display = "none";
    document.getElementById("storyView").style.display = "block";
    document.getElementById("storyBody").textContent = "✨ Cugo is weaving your story…";

    try {
      const res = await fetch("/api/generate-story", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ babyName, ageGroup: selectedAge, theme })
      });

      const data = await res.json();
      let text = data.story || "";

      // Parse title
      let title = "";
      let body = text;
      if (text.startsWith("**")) {
        const end = text.indexOf("**", 2);
        if (end !== -1) {
          title = text.slice(2, end);
          body = text.slice(end + 2).trim();
        }
      }

      document.getElementById("storyTitle").textContent = title;
      document.getElementById("storyBody").textContent = "";

      // Animate word by word
      const words = body.split(" ");
      let current = "";
      for (let i = 0; i < words.length; i++) {
        current += (i === 0 ? "" : " ") + words[i];
        document.getElementById("storyBody").textContent = current;
        await new Promise(r => setTimeout(r, 35));
      }

    } catch (err) {
      document.getElementById("storyBody").textContent = "Something went wrong. Please try again 🌙";
    }

    btn.disabled = false;
    btn.textContent = "✨ Create the Story";
  }

  function resetForm() {
    document.getElementById("formView").style.display = "block";
    document.getElementById("storyView").style.display = "none";
    document.getElementById("babyName").value = "";
    document.getElementById("customTheme").value = "";
    document.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".theme-btn").forEach(b => b.classList.remove("active"));
    selectedAge = "";
    selectedTheme = "";
  }
</script>
</body>
</html>
